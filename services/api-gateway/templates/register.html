<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create your FinSense Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Google Sans', sans-serif; background-color: #fff; }
        .reg-card { border: 1px solid #dadce0; border-radius: 12px; max-width: 800px; width: 100%; }
        .input-outline { border: 1px solid #dadce0; transition: border 0.2s; }
        .input-outline:focus-within { border-color: #1a73e8; border-width: 2px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="reg-card flex flex-col md:flex-row p-10 gap-10 shadow-sm">
        <div class="flex-grow">
            <div class="mb-8">
                <span class="text-2xl font-bold text-blue-600">FinSense</span>
                <h1 class="text-2xl font-normal mt-2">Create your account</h1>
                <p class="text-gray-600">One account for all your financial data</p>
            </div>

            <div class="space-y-6">
                <input type="text" id="username" placeholder="Username" 
                       class="w-full p-3 border border-gray-300 rounded-md outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="password" id="password" placeholder="Password" 
                           class="w-full p-3 border border-gray-300 rounded-md outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600">
                    <input type="password" placeholder="Confirm" 
                           class="w-full p-3 border border-gray-300 rounded-md outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600">
                </div>

                <div class="flex items-center justify-between mt-12">
                    <a href="/login" class="text-blue-600 font-medium hover:bg-blue-50 px-3 py-2 rounded-md">Sign in instead</a>
                    <button onclick="handleRegister()" class="bg-blue-600 text-white px-8 py-2.5 rounded-md font-medium hover:shadow-md transition-all">Next</button>
                </div>
            </div>
        </div>

        <div class="hidden md:flex flex-col items-center justify-center w-72 text-center border-l border-gray-100 pl-10">
            <svg class="w-32 h-32 mb-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 5V11C4 16.07 7.41 20.85 12 22C16.59 20.85 20 16.07 20 11V5L12 2Z" fill="#E8F0FE"/>
                <path d="M12 6L7 8.5V11.5C7 14.5 9.1 17.5 12 18.5C14.9 17.5 17 14.5 17 11.5V8.5L12 6Z" fill="#1A73E8"/>
            </svg>
            <p class="text-sm text-gray-500">Your information is secure and encrypted with institutional-grade standards.</p>
        </div>
    </div>

    <script>
        async function handleRegister() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/api/v1/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            if (res.ok) {
                alert("Account created successfully!");
                window.location.href = '/login';
            } else {
                const data = await res.json();
                alert(data.error || "Registration failed");
            }
        }
    </script>
</body>
</html>
