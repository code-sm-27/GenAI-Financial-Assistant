<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FinSense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; color: #202124; height: 100vh; display: flex; flex-direction: column; }
        .google-header { border-bottom: 1px solid #dadce0; background: #ffffff; flex-shrink: 0; }
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 2rem; scroll-behavior: smooth; }
        .message-bubble { max-width: 80%; padding: 12px 16px; margin-bottom: 12px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .user-message { background-color: #e8f0fe; color: #1967d2; margin-left: auto; border-radius: 18px 18px 4px 18px; }
        .ai-message { background-color: #f1f3f4; color: #3c4043; margin-right: auto; border-radius: 18px 18px 18px 4px; border: 1px solid #e8eaed; }
        .btn-google { background-color: #1a73e8; color: white; transition: all 0.2s; }
        .btn-google:hover { background-color: #1765cc; box-shadow: 0 1px 3px rgba(60,64,67,0.3); }
        .loading-dots span { animation: blink 1.4s infinite both; font-weight: bold; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <header class="google-header p-4">
        <div class="container mx-auto flex justify-between items-center">
            <span class="text-2xl font-medium text-blue-600">FinSense</span>
            <button onclick="logout()" class="text-sm font-medium text-gray-500 hover:text-red-600">Logout</button>
        </div>
    </header>

    <div id="chat-messages" class="chat-container">
        <div class="ai-message message-bubble">
            <p>Welcome to <strong>FinSense</strong>. I'm connected and ready to analyze the market for you. Ask me about a stock or a financial concept.</p>
        </div>
    </div>

    <div class="p-4 border-t border-gray-200 bg-white">
        <div class="container mx-auto max-w-4xl">
            <div id="typing-indicator" class="hidden mb-2 ml-2 text-xs text-gray-400 italic">
                FinSense is analyzing<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
            </div>
            <div class="flex gap-4">
                <input type="text" id="user-input" placeholder="Type a message..." 
                       class="flex-grow p-4 border border-gray-300 rounded-full focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all">
                <button id="send-button" onclick="sendChatQuery()" class="btn-google px-8 rounded-full font-medium">Send</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendChatQuery() {
            const query = userInput.value.trim();
            if (!query) return;

            // 1. Add User Bubble
            const uDiv = document.createElement('div');
            uDiv.className = 'user-message message-bubble';
            uDiv.innerText = query;
            chatMessages.appendChild(uDiv);
            
            userInput.value = '';
            typingIndicator.classList.remove('hidden');
            scrollToBottom();

            try {
                const res = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': token 
                    },
                    body: JSON.stringify({ query: query })
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return;
                }

                const data = await res.json();
                
                // 2. Add AI Bubble
                const aiDiv = document.createElement('div');
                aiDiv.className = 'ai-message message-bubble';
                aiDiv.innerHTML = data.advice ? data.advice.replace(/\n/g, '<br>') : "Error: No advice received.";
                chatMessages.appendChild(aiDiv);

            } catch (e) {
                const errDiv = document.createElement('div');
                errDiv.className = 'ai-message message-bubble text-red-500';
                errDiv.innerText = "Connection lost. Please check if the backend is running.";
                chatMessages.appendChild(errDiv);
            } finally {
                typingIndicator.classList.add('hidden');
                scrollToBottom();
            }
        }

        // Handle Enter Key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatQuery();
        });
    </script>
</body>
</html>
