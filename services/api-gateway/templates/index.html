<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSense Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .chat-scroll { height: calc(100vh - 80px); }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <header class="bg-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-blue-600">FinSense AI</h1>
        <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-semibold">Logout</button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 chat-scroll">
        <div class="flex justify-start">
            <div class="bg-white border border-gray-200 text-gray-800 p-3 rounded-lg shadow-sm max-w-[80%]">
                Hello! I am ready to help you. Ask me anything about finance.
            </div>
        </div>
    </main>

    <footer class="bg-white p-4 border-t border-gray-200">
        <form id="chat-form" class="flex gap-2">
            <input type="text" id="user-input" 
                class="flex-1 border border-gray-300 rounded-lg p-2 focus:outline-none focus:border-blue-500" 
                placeholder="Type your message here..." autocomplete="off">
            <button type="submit" 
                class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                Send
            </button>
        </form>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        // 1. Check Login
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        // 2. Handle Message Sending
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // Add User Message
            addMessage(message, 'user');
            userInput.value = '';
            
            // Add Loading Bubble
            const loadingId = addLoading();

            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify({ query: message })
                });

                // Remove Loading Bubble
                document.getElementById(loadingId).remove();

                const data = await response.json();

                if (response.ok) {
                    addMessage(data.advice, 'ai');
                } else {
                    addMessage("Error: " + (data.error || "Session Expired"), 'error');
                    if (response.status === 401) setTimeout(logout, 2000);
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage("Network Error: Could not reach server.", 'error');
            }
        });

        // Helper: Add Message to Screen
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = type === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            let bgClass = '';
            if (type === 'user') bgClass = 'bg-blue-600 text-white';
            else if (type === 'error') bgClass = 'bg-red-100 text-red-600 border border-red-200';
            else bgClass = 'bg-white border border-gray-200 text-gray-800';

            div.innerHTML = `
                <div class="${bgClass} p-3 rounded-lg shadow-sm max-w-[80%] break-words">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Helper: Show Loading Dots
        function addLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start';
            div.innerHTML = `
                <div class="bg-gray-100 text-gray-500 p-3 rounded-lg text-xs italic">
                    Thinking...
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
