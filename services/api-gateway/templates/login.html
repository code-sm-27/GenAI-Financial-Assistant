<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - FinSense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Google Sans', 'Roboto', sans-serif; background-color: #f8f9fa; color: #202124; }
        .auth-card { 
            background: #ffffff; 
            border: 1px solid #dadce0; 
            border-radius: 12px; 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }
        .auth-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .google-blue { background-color: #1a73e8; }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            transform: translateY(-28px) scale(0.85);
            color: #1a73e8;
            background-color: white;
            padding: 0 4px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="auth-card w-full max-w-[450px] p-10 mx-4">
        <div class="text-center mb-10">
            <div class="flex justify-center mb-4">
                <span class="text-3xl font-bold tracking-tighter text-blue-600">Fin</span>
                <span class="text-3xl font-bold tracking-tighter text-gray-700">Sense</span>
            </div>
            <h1 class="text-2xl font-normal text-gray-800">Sign in</h1>
            <p class="text-gray-600 mt-2">Continue to FinSense Intelligence</p>
        </div>

        <div class="space-y-8">
            <div class="relative input-group">
                <input type="text" id="username" placeholder=" " 
                       class="w-full px-4 py-4 border border-gray-300 rounded-md outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-base peer">
                <label class="absolute left-4 top-4 text-gray-500 pointer-events-none transition-all duration-200 transform origin-left">Email or username</label>
            </div>
            
            <div class="relative input-group">
                <input type="password" id="password" placeholder=" " 
                       class="w-full px-4 py-4 border border-gray-300 rounded-md outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-base peer">
                <label class="absolute left-4 top-4 text-gray-500 pointer-events-none transition-all duration-200 transform origin-left">Enter your password</label>
            </div>

            <div class="flex items-center justify-between pt-10">
                <a href="/register" class="text-blue-600 font-medium hover:bg-blue-50 px-3 py-2 rounded-md transition-all duration-200">Create account</a>
                <button onclick="handleLogin()" id="loginBtn"
                        class="google-blue text-white px-8 py-2.5 rounded-md font-medium text-sm hover:shadow-lg transition-all active:scale-95">
                    Next
                </button>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(!user || !pass) return alert("Please fill details");

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/';
                } else {
                    alert(data.error || "Authentication failed");
                    btn.innerText = "Next";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Server Connection Failed");
                btn.innerText = "Next";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
